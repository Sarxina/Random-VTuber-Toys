name: PR — AO3Tagger

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, labeled, unlabeled]
    paths:
      - "AO3Tagger/standalone/**"

jobs:
  pr-checks:
    uses: Sarxina/sarxina-tools/.github/workflows/pr-checks.yml@main
    with:
      package_json_dir: AO3Tagger/standalone
