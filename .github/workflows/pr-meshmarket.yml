name: PR — MeshMarket

# Path-filtered to MeshMarket changes. Only runs the version-label and
# version-bump checks against MeshMarket/standalone/package.json. PRs
# that don't touch MeshMarket don't trigger this workflow at all.
on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, labeled, unlabeled]
    paths:
      - "MeshMarket/standalone/**"

jobs:
  pr-checks:
    uses: Sarxina/sarxina-tools/.github/workflows/pr-checks.yml@main
    with:
      package_json_dir: MeshMarket/standalone
