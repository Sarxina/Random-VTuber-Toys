name: Publish MeshMarket

# Triggers on push to main when MeshMarket/standalone changes. Reads
# MeshMarket/standalone/package.json's version, runs tests + build +
# npm publish, creates and pushes the meshmarket-v<version> tag.
#
# Per-toy tag prefix (`meshmarket-v` rather than the default `v`) keeps
# each toy's tag namespace independent.
on:
  push:
    branches: [main]
    paths:
      - "MeshMarket/standalone/**"

jobs:
  release:
    uses: Sarxina/sarxina-tools/.github/workflows/release.yml@main
    permissions:
      contents: write
      id-token: write
    with:
      working_directory: MeshMarket/standalone
      tag_prefix: meshmarket-v
      npm_publish: true
      run_tests: false   # MeshMarket has no test suite yet
    secrets: inherit
