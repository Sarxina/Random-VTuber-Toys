name: Publish FoxyJumpscare

on:
  push:
    branches: [main]
    paths:
      - "FoxyJumpscare/standalone/**"

jobs:
  release:
    uses: Sarxina/sarxina-tools/.github/workflows/release.yml@main
    permissions:
      contents: write
      id-token: write
    with:
      working_directory: FoxyJumpscare/standalone
      tag_prefix: foxyjumpscare-v
      npm_publish: true
      run_tests: false
    secrets: inherit
