name: Publish GetDown

on:
  push:
    branches: [main]
    paths:
      - "GetDown/standalone/**"

jobs:
  release:
    uses: Sarxina/sarxina-tools/.github/workflows/release.yml@main
    permissions:
      contents: write
      id-token: write
    with:
      working_directory: GetDown/standalone
      tag_prefix: getdown-v
      npm_publish: true
      run_tests: false
    secrets: inherit
