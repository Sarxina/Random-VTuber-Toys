name: Publish AO3Tagger

on:
  push:
    branches: [main]
    paths:
      - "AO3Tagger/standalone/**"

jobs:
  release:
    uses: Sarxina/sarxina-tools/.github/workflows/release.yml@main
    permissions:
      contents: write
      id-token: write
    with:
      working_directory: AO3Tagger/standalone
      tag_prefix: ao3tagger-v
      npm_publish: true
      run_tests: false
    secrets: inherit
